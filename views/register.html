<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
</head>
<style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
         h1 {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            color: blue;
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 2px 2px #ccc;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            text-align: center;
            text-shadow: #45a049;  
        }
        header {
            background-color: blue;
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
        }
        nav ul {
            list-style: none;
            padding: 0;
        }
        nav ul li {
            display: inline;
            margin: 0 15px;
        }
        nav ul li :hover {
            text-decoration: underline;
            color: #45a049;
        }
        nav ul li a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }
        main {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }
        form {
            margin-bottom: 30px;
            border: 5px solid #0c20d7;
            background-color: burlywood;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        footer {
            background-color: blue;
            color: #ffffff;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
        form {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input[type="text"], input[type="email"], input[type="password"], input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: blue;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
<body>
     <h1>Bienvenue à l'ASC LAMAN JI</h1>
    <p>Ceci est la page d'inscription de l'ASC LAMAN JI.</p>
    <header>
        <nav>
            <ul>
                <li><a href="/">Accueil</a></li>
                <li><a href="/about">À propos</a></li>
                <li><a href="/services">Services</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </nav>
    </header>
     <form action="/register" id="register-form" method="post">
            <fieldset>
                <legend>Informations de création de compte</legend>
                <input type="email" placeholder="email" required><br>
                <input type="password" placeholder="password" required><br>
            </fieldset>
            <button type="submit">Créer un compte</button>
        </form>
</body>
</html>
